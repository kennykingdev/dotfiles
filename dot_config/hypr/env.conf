env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct # tells qt apps to pick theme from qt6ct, use with Kvantum
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland # remove or set to x11 if older games need for compatibility
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1 #disable window decorations on qt apps
